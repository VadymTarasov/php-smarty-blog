version: "3.7"

networks:
    app-network:
        driver: bridge

services:
    php:
        build:
            context: .
            dockerfile: ./docker/php-fpm/Dockerfile
        container_name: dev_php
        volumes:
            - ./:/var/www:cached
        depends_on:
            - mysql
        networks:
            - app-network

    nginx:
        build: ./docker/nginx
        container_name: dev_nginx
        volumes:
            - ./logs/nginx:/var/log/nginx:cached
            - ./:/var/www:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        ports:
            - "80:80"
        depends_on:
            - php
        networks:
            - app-network

    mysql:
        image: mysql:8.0.36
        container_name: dev_mysql
        restart: always
        environment:
            MYSQL_DATABASE: database
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "8101:3306"
        command: --character-set-server=utf8 --collation-server=utf8_unicode_ci --default-time-zone=+03:00
        volumes:
            - ./tmp/mysql:/var/lib/mysql
        networks:
            - app-network